<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Google Analytics (Medición de Entrada) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GF2M8EMBZG"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-GF2M8EMBZG');
      gtag('event', 'paso1_ingreso_senuelo', {'page_title': 'Página Señuelo'});
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julieta Prado</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c20 0%, #060608 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        /* DOS FLECHITAS MÁS GRUESAS Y PEGADAS APUNTANDO RECTO HACIA ARRIBA */
        .flechas-top {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            color: #ff007f;
            display: flex;
            gap: 6px;
            z-index: 100;
            font-weight: 900; /* Hace las flechas un poco más gruesas */
            animation: apuntarArriba 0.5s infinite ease-in-out;
        }
        
        @keyframes apuntarArriba {
            0% { transform: translateY(4px); opacity: 0.5; }
            50% { opacity: 1; }
            100% { transform: translateY(-4px); opacity: 0.2; }
        }

        /* CARTELITO FLOTANTE MÁS CHICO Y BIEN ARRIBA (COMO ANTES) */
        .cartelito-guia {
            position: absolute;
            top: 42px;
            right: 15px;
            max-width: 235px; /* Un poco más compacto */
            background: rgba(20, 18, 32, 0.9);
            padding: 10px 12px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            text-align: right;
            z-index: 99;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-right: 4px solid #ff007f;
        }

        .cartelito-guia p {
            margin: 0;
            font-size: 12px;
            line-height: 1.35;
            color: #ffffff;
            font-weight: 500;
        }

        .cartelito-guia strong {
            color: #ffffff;
            font-weight: 700;
        }

        /* DISEÑO DE TU PERFIL IDENTICO */
        .contenedor {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04); 
            padding: 35px 24px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            margin-top: 65px; /* Despega el perfil del cartel superior */
        }
        
        .foto-perfil {
            width: 130px; 
            height: 130px;
            border-radius: 50%;
            border: 3px solid #ff007f; 
            margin: 0 auto 20px auto;
            background-image: url('https://i.ibb.co/1YGSymV9/image.jpg'); 
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.5); 
        }
        
        h1 { font-size: 26px; margin-bottom: 15px; font-weight: 700; letter-spacing: -0.5px; }
        p.descripcion { font-size: 14.5px; color: #e2e2e9; margin-bottom: 28px; line-height: 1.5; text-align: center; }
        
        .boton-real {
            display: block;
            width: 100%;
            padding: 17px;
            background-color: #ff007f; 
            color: #ffffff;
            font-size: 19px; 
            font-weight: bold;
            text-decoration: none;
            border-radius: 30px; 
            box-shadow: 0 6px 25px rgba(255, 0, 127, 0.3);
            border: none;
            margin-bottom: 35px;
            cursor: pointer;
        }
        
        .redes-contenedor {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 26px; 
        }
        
        .icono {
            color: rgba(255, 255, 255, 0.4);
            font-size: 30px; 
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Dos flechitas estables apuntando directamente hacia arriba -->
    <div class="flechas-top">
        <i class="fas fa-arrow-up"></i>
        <i class="fas fa-arrow-up"></i>
    </div>

    <!-- El cartel flotante superior corregido en tamaño y posición -->
    <div class="cartelito-guia">
        <p id="txt-cartel">✨ <strong>Si la página no responde:</strong><br>Toca los 3 puntitos y elige <strong>"Abrir en el navegador"</strong></p>
    </div>

    <!-- Contenedor del Perfil Señuelo -->
    <div class="contenedor">
        <div class="foto-perfil"></div> 
        
        <h1>Julieta Prado ✨</h1>
        
        <p class="descripcion" id="texto-bio">👋 Solamente contesto los mensajes por aquí. Si quieres conocerme de una manera más privada 🔑 o conocerme un poco más... ¡haz clic abajo! 👇</p>

        <button class="boton-real" id="boton-link">
            💬 Habla conmigo aquí
        </button>

        <div class="redes-contenedor">
            <a class="icono" id="link-tg" style="color: rgba(255,255,255,0.5);">
                <i class="fab fa-telegram-plane"></i>
            </a>
            <a class="icono" id="link-x">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </a>
            <a class="icono" id="link-tt">
                <i class="fab fa-tiktok"></i>
            </a>
            <a class="icono" id="link-ig">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
    </div>

    <script>
        const urlDestinoReal = "https://yomarasalinas025-create.github.io/Julieta-Prado/";

        // Evaluar entorno de navegación
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        const estaEnInstagram = userAgent.includes("Instagram") || userAgent.includes("FBAN") || userAgent.includes("FBAV");

        // Si ya logró salir de Instagram, redirige directo a la página verdadera
        if (!estaEnInstagram) {
            gtag('event', 'paso2_salto_exitoso', {
                'event_callback': function() {
                    window.location.href = urlDestinoReal;
                }
            });
            setTimeout(function() {
                window.location.href = urlDestinoReal;
            }, 300);
        }

        // Función unificada para registrar clics e indicar el uso de los tres puntitos
        function procesarIntentoSeñuelo(nombreAccion) {
            gtag('event', 'clic_en_senuelo', {
                'elemento_tocado': nombreAccion,
                'event_callback': function() {
                    // En la página señuelo los botones no deben llevar a ningún lado externo directamente si sigue en Instagram
                    alert("Por favor, usa la indicación de arriba: toca los 3 puntitos y selecciona 'Abrir en el navegador' para acceder.");
                }
            });
        }

        // Asignación de eventos preventivos para que ningún botón saque de la app sin los 3 puntitos
        document.getElementById('boton-link').addEventListener('click', function() {
            procesarIntentoSeñuelo('clic_habla_conmigo');
        });
        document.getElementById('link-tg').addEventListener('click', function() { procesarIntentoSeñuelo('red_telegram'); });
        document.getElementById('link-x').addEventListener('click', function() { procesarIntentoSeñuelo('red_x'); });
        document.getElementById('link-tt').addEventListener('click', function() { procesarIntentoSeñuelo('red_tiktok'); });
        document.getElementById('link-ig').addEventListener('click', function() { procesarIntentoSeñuelo('red_instagram'); });

        // Sistema de Traducción según idioma del terminal
        const idiomaCelular = navigator.language || navigator.userLanguage;
        const dialectos = {
            es: {
                cartel: "✨ <strong>Si la página no responde:</strong><br>Toca los 3 puntitos y elige <strong>\"Abrir en el navegador\"</strong>",
                bio: "👋 Solamente contesto los mensajes por aquí. Si quieres conocerme de una manera más privada 🔑 o conocerme un poco más... ¡haz clic abajo! 👇"
            },
            en: {
                cartel: "✨ <strong>If the page doesn't respond:</strong><br>Tap the 3 dots and choose <strong>\"Open in browser\"</strong>",
                bio: "👋 I only answer messages here. If you want to know me in a more private way 🔑 or get to know me a little more... click below! 👇"
            },
            pt: {
                cartel: "✨ <strong>Se a página não responder:</strong><br>Toque nos 3 pontinhos e escolha <strong>\"Abrir no navegador\"</strong>",
                bio: "👋 Só respondo mensagens por aqui. Se você quer me conhecer de uma forma mais privada 🔑 ou me conhecer um pouco mais... clique abaixo! 👇"
            }
        };

        let lng = 'es';
        if (idiomaCelular.startsWith('en')) lng = 'en';
        if (idiomaCelular.startsWith('pt')) lng = 'pt';

        document.getElementById('txt-cartel').innerHTML = dialectos[lng].cartel;
        document.getElementById('texto-bio').innerHTML = dialectos[lng].bio;
    </script>

</body>
</html>
