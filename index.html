<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto Privado</title>
    <!-- Librería para los íconos inofensivos de abajo -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c20 0%, #060608 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .contenedor {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04); 
            padding: 35px 24px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        .foto-perfil {
            width: 130px; 
            height: 130px;
            border-radius: 50%;
            border: 3px solid #ff007f; 
            margin: 0 auto 20px auto;
            background-image: url('https://i.ibb.co/1YGSymV9/image.jpg'); 
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.6); 
        }
        
        h1 {
            font-size: 26px;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        p {
            font-size: 15px;
            color: #e2e2e9;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        
        /* BOTÓN ESTÁTICO (No vibra y parece una imagen inofensiva) */
        .boton-falso {
            display: block;
            width: 100%;
            padding: 18px;
            background-color: #ff007f; 
            color: #ffffff;
            font-size: 19px; 
            font-weight: bold;
            text-decoration: none;
            border-radius: 30px; 
            box-shadow: 0 6px 25px rgba(255, 0, 127, 0.4);
            border: none;
            margin-bottom: 20px;
            user-select: none;
        }
        
        /* TU CARTEL PERSONALIZADO */
        .cartel-sutil {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 30px;
            font-style: italic;
            line-height: 1.4;
        }
        .cartel-sutil i {
            color: #ff007f;
            margin-right: 4px;
        }

        .redes-contenedor {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin-top: 10px;
        }
        .icono-falso {
            color: rgba(255, 255, 255, 0.4);
            font-size: 24px;
            text-decoration: none;
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <div class="foto-perfil"></div> 
        
        <h1>Julieta Prado ✨</h1>
        
        <p>👋 Solamente contesto los mensajes por aquí. Si quieres conocerme de una manera más privada 🔑 o conocerme un poco más... ¡haz clic abajo! 👇</p>

        <div class="boton-falso">
            💬 Habla conmigo aquí
        </div>

        <!-- TU CARTEL TEXTUAL EXACTO -->
        <div class="cartel-sutil">
            <i class="fa-solid fa-circle-info"></i> si no funciona la página, toca los tres puntitos que están en la parte superior derecha y abre en un navegador externo.
        </div>

        <div class="redes-contenedor">
            <div class="icono-falso">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="rgba(255, 255, 255, 0.4)"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </div>
            <div class="icono-falso"><i class="fab fa-tiktok"></i></div>
            <div class="icono-falso"><i class="fab fa-telegram-plane"></i></div>
        </div>
    </div>

    <script>
    window.onload = function() {
        var userAgent = navigator.userAgent || navigator.vendor || window.opera;
        
        // El código verifica si el usuario ya NO está atrapado dentro de Instagram
        var estaEnInstagram = /Instagram/i.test(userAgent);
        
        if (!estaEnInstagram) {
            // Al abrir en el navegador externo, salta automáticamente a tu búnker real
            window.location.href = "https://yomarasalinas025-create.github.io/Julieta-Prado/";
        }
    };
    </script>

</body>
</html>
