<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Google Analytics (Medición Completa) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GF2M8EMBZG"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-GF2M8EMBZG');
      // Reporta el ingreso exacto
      gtag('event', 'paso1_ingreso_senuelo', {'page_title': 'Página Señuelo'});
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julieta Prado</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c20 0%, #060608 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        /* DOS FLECHITAS MÁS GRUESAS, JUNTAS Y HACIA ARRIBA */
        .flechas-top {
            position: absolute;
            top: 25px;
            right: 25px;
            font-size: 20px; /* Tamaño ideal */
            color: #ff007f;
            display: flex;
            gap: 6px; /* Más juntas */
            z-index: 100;
            animation: apuntarArriba 0.5s infinite ease-in-out;
        }

        .flechas-top i {
            font-weight: 900; /* Un poquito más gruesas */
        }
        
        @keyframes apuntarArriba {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.5; }
            50% { transform: translateY(-5px) scale(1.05); opacity: 1; }
        }

        /* CARTELITO FLOTANTE EXACTO AL ORIGINAL (MÁS ARRIBA Y CHICO) */
        .cartelito-guia {
            position: absolute;
            top: 60px; /* Más arriba, cerca de las flechas */
            right: 20px;
            max-width: 235px; /* Un poquito más chico, tamaño original */
            background: rgba(20, 18, 32, 0.85);
            padding: 10px 14px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            text-align: right;
            z-index: 99;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-right: 4px solid #ff007f;
        }

        .cartelito-guia p {
            margin: 0;
            font-size: 12.5px; /* Estilizado y compacto */
            line-height: 1.35;
            color: #ffffff;
            font-weight: 500;
        }

        .cartelito-guia strong {
            color: #ffffff;
            font-weight: 700;
        }

        /* CONTENEDOR PRINCIPAL CON ESPACIO CORRECTO */
        .contenedor {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04); 
            padding: 35px 24px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            margin-top: 65px; /* Separado del cartel flotante como el original */
        }
        
        .foto-perfil {
            width: 130px; 
            height: 130px;
            border-radius: 50%;
            border: 3px solid #ff007f; 
            margin: 0 auto 20px auto;
            background-image: url('https://i.ibb.co/1YGSymV9/image.jpg'); 
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.5); 
        }
        
        h1 { font-size: 26px; margin-bottom: 15px; font-weight: 700; letter-spacing: -0.5px; }
        p.descripcion { font-size: 14.5px; color: #e2e2e9; margin-bottom: 28px; line-height: 1.5; text-align: center; }
        
        .boton-real {
            display: block;
            width: 100%;
            padding: 17px;
            background-color: #ff007f; 
            color: #ffffff;
            font-size: 19px; 
            font-weight: bold;
            text-decoration: none;
            border-radius: 30px; 
            box-shadow: 0 6px 25px rgba(255, 0, 127, 0.3);
            border: none;
            margin-bottom: 35px;
            cursor: pointer;
        }
        
        .redes-contenedor {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 26px; 
        }
        
        .icono {
            color: rgba(255, 255, 255, 0.4);
            font-size: 30px; 
            text-decoration: none;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .icono:hover { color: #ff007f; }
    </style>
</head>
<body>

    <!-- Las dos flechitas juntas y más gruesas apuntando recto hacia arriba -->
    <div class="flechas-top">
        <i class="fas fa-arrow-up"></i>
        <i class="fas fa-arrow-up"></i>
    </div>

    <!-- El cartel flotante perfectamente ubicado -->
    <div class="cartelito-guia">
        <p id="txt-cartel">✨ <strong>Si la página no responde:</strong><br>Toca los 3 puntitos y elige <strong>"Abrir en el navegador"</strong></p>
    </div>

    <!-- Tu perfil idéntico y limpio -->
    <div class="contenedor">
        <div class="foto-perfil"></div> 
        
        <h1>Julieta Prado ✨</h1>
        
        <p class="descripcion" id="texto-bio">👋 Solamente contesto los mensajes por aquí. Si quieres conocerme de una manera más privada 🔑 o conocerme un poco más... ¡haz clic abajo! 👇</p>

        <button class="boton-real" id="boton-link">
            💬 Habla conmigo aquí
        </button>

        <div class="redes-contenedor">
            <a class="icono" href="https://t.me/juliprado" target="_blank" style="color: rgba(255,255,255,0.5);">
                <i class="fab fa-telegram-plane"></i>
            </a>
            <a class="icono" href="https://x.com/juliprado03?s=11" target="_blank">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </a>
            <a class="icono" href="https://www.tiktok.com/@juli.prado03" target="_blank">
                <i class="fab fa-tiktok"></i>
            </a>
            <a class="icono" href="https://www.instagram.com/juprado.of" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
    </div>

    <script>
        // REDIRECCIÓN AUTOMÁTICA Y ESTADÍSTICAS
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        const estaEnInstagram = userAgent.includes("Instagram") || userAgent.includes("FBAN") || userAgent.includes("FBAV");

        if (!estaEnInstagram) {
            // Reporta salto exitoso al navegador externo
            gtag('event', 'paso2_salto_exitoso', {
                'event_callback': function() {
                    window.location.href = "https://yomarasalinas025-create.github.io/Julieta-Prado/";
                }
            });
            setTimeout(function() {
                window.location.href = "https://yomarasalinas025-create.github.io/Julieta-Prado/";
            }, 400);
        }

        // Si hacen clic en el botón principal
        document.getElementById('boton-link').addEventListener('click', function() {
            gtag('event', 'clic_boton_habla_conmigo', {
                'event_callback': function() {
                    window.location.href = "https://yomarasalinas025-create.github.io/Julieta-Prado/";
                }
            });
            setTimeout(function() {
                window.location.href = "https://yomarasalinas025-create.github.io/Julieta-Prado/";
            }, 300);
        });

        // Traducción automática internacional
        const idiomaCelular = navigator.language || navigator.userLanguage;
        const dialectos = {
            es: {
                cartel: "✨ <strong>Si la página no responde:</strong><br>Toca los 3 puntitos y elige <strong>\"Abrir en el navegador\"</strong>",
                bio: "👋 Solamente contesto los mensajes por aquí. Si quieres conocerme de una manera más privada 🔑 o conocerme un poco más... ¡haz clic abajo! 👇"
            },
            en: {
                cartel: "✨ <strong>If the page doesn't respond:</strong><br>Tap the 3 dots and choose <strong>\"Open in browser\"</strong>",
                bio: "👋 I only answer messages here. If you want to know me in a more private way 🔑 or get to know me a little more... click below! 👇"
            },
            pt: {
                cartel: "✨ <strong>Se a página não responder:</strong><br>Toque nos 3 pontinhos e escolha <strong>\"Abrir no navegador\"</strong>",
                bio: "👋 Só respondo mensagens por aqui. Se você quer me conhecer de uma forma mais privada 🔑 o me conhecer um pouco mais... clique abaixo! 👇"
            }
        };

        let lng = 'es';
        if (idiomaCelular.startsWith('en')) lng = 'en';
        if (idiomaCelular.startsWith('pt')) lng = 'pt';

        document.getElementById('txt-cartel').innerHTML = dialectos[lng].cartel;
        document.getElementById('texto-bio').innerHTML = dialectos[lng].bio;
    </script>

</body>
</html>
