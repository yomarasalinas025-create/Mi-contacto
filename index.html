<!DOCTYPE html>
<html lang="es">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GF2M8EMBZG"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-GF2M8EMBZG');
      // Evento automático: Entró al señuelo
      gtag('event', 'paso1_ingreso_senuelo', {'page_title': 'Página Señuelo'});
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background-color: #0d0e15;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .alerta-navegador {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            padding: 30px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        .icono-guia {
            font-size: 45px;
            color: #ff007f;
            margin-bottom: 15px;
            animation: flotar 2s infinite ease-in-out;
        }
        @keyframes flotar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        h2 { font-size: 22px; margin-bottom: 12px; font-weight: 600; }
        p { font-size: 15px; color: #b0b3c6; line-height: 1.6; margin-bottom: 0; }
        .pasos {
            text-align: left;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 20px;
            border-radius: 12px;
            margin-top: 20px;
        }
        .paso-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 14.5px;
        }
        .paso-item:last-child { margin-bottom: 0; }
        .numero {
            background: #ff007f;
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="alerta-navegador">
        <div class="icono-guia">
            <i class="fas fa-compass"></i>
        </div>
        <h2 id="titulo-alerta">Abrir en el navegador</h2>
        <p id="desc-alerta">Para proteger tu privacidad y asegurar una conexión segura, por favor abre este enlace en tu navegador externo.</p>
        
        <div class="pasos">
            <div class="paso-item">
                <div class="numero">1</div>
                <span id="paso1-text">Toca los 3 puntitos (右上角 / •••) arriba.</span>
            </div>
            <div class="paso-item">
                <div class="numero">2</div>
                <span id="paso2-text">Selecciona "Abrir en el navegador".</span>
            </div>
        </div>
    </div>

    <script>
        // REDIRECCIÓN AUTOMÁTICA AFUERA DE INSTAGRAM (Deep Link)
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        const estaEnInstagram = userAgent.includes("Instagram") || userAgent.includes("FBAN") || userAgent.includes("FBAV");

        if (!estaEnInstagram) {
            // Mandar evento a Google indicando que el salto fue exitoso (Paso 2)
            gtag('event', 'paso2_salto_exitoso', {
                'event_callback': function() {
                    window.location.href = "https://yomarasalinas025-create.github.io/Julieta-Prado/";
                }
            });
            // Resguardo por si Google tarda en responder
            setTimeout(function() {
                window.location.href = "https://yomarasalinas025-create.github.io/Julieta-Prado/";
            }, 400);
        }

        // TRADUCTOR MULTI-IDIOMA AUTOMÁTICO
        const idiomaCelular = navigator.language || navigator.userLanguage;
        const traducciones = {
            es: {
                titulo: "Abrir en el navegador",
                desc: "Para proteger tu privacidad y asegurar una conexión segura, por favor abre este enlace en tu navegador externo.",
                p1: "Toca los 3 puntitos (•••) arriba a la derecha.",
                p2: "Selecciona 'Abrir en el navegador'."
            },
            en: {
                titulo: "Open in Browser",
                desc: "To protect your privacy and ensure a secure connection, please open this link in your external browser.",
                p1: "Tap the 3 dots (•••) at the top right.",
                p2: "Select 'Open in browser'."
            },
            pt: {
                titulo: "Abrir no navegador",
                desc: "Para proteger sua privacidade e garantir uma conexão segura, abra este link no seu navegador externo.",
                p1: "Toque nos 3 pontinhos (•••) no canto superior direito.",
                p2: "Selecione 'Abrir no navegador'."
            }
        };

        let lang = 'es';
        if (idiomaCelular.startsWith('en')) lang = 'en';
        if (idiomaCelular.startsWith('pt')) lang = 'pt';

        document.getElementById('titulo-alerta').innerText = traducciones[lang].titulo;
        document.getElementById('desc-alerta').innerText = traducciones[lang].desc;
        document.getElementById('paso1-text').innerText = traducciones[lang].p1;
        document.getElementById('paso2-text').innerText = traducciones[lang].p2;
    </script>

</body>
</html>
