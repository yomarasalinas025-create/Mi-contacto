<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto Privado</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c20 0%, #060608 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        /* BLOQUE SUPERIOR DE GUÍA */
        .bloque-instruccion {
            position: absolute;
            top: 15px;
            right: 20px;
            max-width: 260px;
            text-align: right;
            z-index: 100;
        }

        /* FLECHITAS RÁPIDAS */
        .flechitas-guia {
            font-size: 26px;
            color: #ff007f;
            font-weight: bold;
            margin-bottom: 2px;
            display: block;
            animation: reboteRapido 0.5s infinite ease-in-out;
        }
        
        @keyframes reboteRapido {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.8; }
            50% { transform: translateY(-6px) scale(1.15); opacity: 1; }
        }

        /* CARTELITO DE GUÍA SUPERIOR */
        .texto-guia-superior {
            font-size: 12px;
            line-height: 1.3;
            color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 12px;
            border-radius: 10px;
            border-right: 2px solid #ff007f;
            backdrop-filter: blur(5px);
            text-align: right;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .contenedor {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04); 
            padding: 35px 24px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            margin-top: 40px;
        }
        
        .foto-perfil {
            width: 130px; 
            height: 130px;
            border-radius: 50%;
            border: 3px solid #ff007f; 
            margin: 0 auto 20px auto;
            background-image: url('https://i.ibb.co/1YGSymV9/image.jpg'); 
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.5); 
        }
        
        h1 {
            font-size: 26px;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        p.descripcion {
            font-size: 14.5px;
            color: #e2e2e9;
            margin-bottom: 28px;
            line-height: 1.5;
        }
        
        .boton-falso {
            display: block;
            width: 100%;
            padding: 17px;
            background-color: #ff007f; 
            color: #ffffff;
            font-size: 19px; 
            font-weight: bold;
            text-decoration: none;
            border-radius: 30px; 
            box-shadow: 0 6px 25px rgba(255, 0, 127, 0.3);
            border: none;
            margin-bottom: 30px;
            user-select: none;
        }
        
        .redes-contenedor {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 22px;
        }
        .icono-falso {
            color: rgba(255, 255, 255, 0.3);
            font-size: 22px;
            text-decoration: none;
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="bloque-instruccion">
        <span class="flechitas-guia">↗ ↗</span>
        <div class="texto-guia-superior" id="cartel-guia">
            ✨ <b>Si la página no responde:</b><br>
            Toca los 3 puntitos y elige <b>"Abrir en el navegador"</b>
        </div>
    </div>

    <div class="contenedor">
        <div class="foto-perfil"></div> 
        
        <h1>Julieta Prado ✨</h1>
        
        <p class="descripcion" id="texto-bio">👋 Solamente contesto los mensajes por aquí. Si quieres conocerme de una manera más privada 🔑 o conocerme un poco más... ¡haz clic abajo! 👇</p>

        <div class="boton-falso" id="boton-texto">
            💬 Habla conmigo aquí
        </div>

        <div class="redes-contenedor">
            <div class="icono-falso">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="rgba(255, 255, 255, 0.3)"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </div>
            <div class="icono-falso"><i class="fab fa-tiktok"></i></div>
            <div class="icono-falso"><i class="fab fa-telegram-plane"></i></div>
            <div class="icono-falso"><i class="fab fa-instagram"></i></div>
        </div>
    </div>

    <script>
        // TRADUCCIÓN AUTOMÁTICA SEGÚN EL TELÉFONO
        const idiomaCelular = navigator.language || navigator.userLanguage;
        
        const traducciones = {
            es: {
                cartel: "✨ <b>Si la página no responde:</b><br>Toca los 3 puntitos y elige <b>\"Abrir en el navegador\"</b>",
                bio: "👋 Solamente contesto los mensajes por aquí. Si quieres conocerme de una manera más privada 🔑 o conocerme un poco más... ¡haz clic abajo! 👇",
                boton: "💬 Habla conmigo aquí"
            },
            en: {
                cartel: "✨ <b>If the page doesn't respond:</b><br>Tap the 3 dots and choose <b>\"Open in browser\"</b>",
                bio: "👋 I only answer messages here. If you want to know me in a more private way 🔑 or get to know me a little more... click below! 👇",
                boton: "💬 Talk to me here"
            },
            pt: {
                cartel: "✨ <b>Se a página não responder:</b><br>Toque nos 3 pontinhos e escolha <b>\"Abrir no navegador\"</b>",
                bio: "👋 Só respondo mensagens por aqui. Se você quer me conhecer de uma forma mais privada 🔑 ou me conhecer um pouco mais... clique abaixo! 👇",
                boton: "💬 Fale comigo aqui"
            }
        };

        let lang = 'es';
        if (idiomaCelular.startsWith('en')) lang = 'en';
        if (idiomaCelular.startsWith('pt')) lang = 'pt';

        // Aplica el idioma correspondiente de forma limpia e invisible
        document.getElementById('cartel-guia').innerHTML = traducciones[lang].cartel;
        document.getElementById('texto-bio').innerHTML = traducciones[lang].bio;
        document.getElementById('boton-text').innerHTML = traducciones[lang].boton;

        // CONTROL DE REDIRECCIÓN INTELIGENTE
        window.onload = function() {
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            var estaEnInstagram = /Instagram/i.test(userAgent);
            
            // Si el usuario sale de IG o es un navegador normal, lo manda directo a tu página real con los enlaces activos
            if (!estaEnInstagram) {
                window.location.href = "https://yomarasalinas025-create.github.io/Julieta-Prado/";
            }
        };
    </script>

</body>
</html>
